<body>

    <!-- 1 таблица -->
    <table>
        <caption>1-я таблица</caption>

        <tbody>
            <tr>
                <th rowspan="2">1</th>
                <td colspan="2">2</td>
            </tr>

            <tr>
                <td>5</td>
                <td>6</td>
            </tr>
        </tbody>
    </table>


    <!-- 2 таблица -->
    <table>
        <caption>2-я таблица</caption>

        <tbody>
            <tr>
                <th colspan="2">1</th>
            </tr>

            <tr>
                <td>3</td>
                <td>4</td>
            </tr>

            <tr>
                <td>5</td>
                <td>6</td>
            </tr>
        </tbody>
    </table>


    <!-- 3 таблица -->
    <table>
        <caption>3-я таблица</caption>

        <tbody>
            <tr>
                <th rowspan="2">1</th>
                <th>2</th>
            </tr>

            <tr>
                <td>4</td>
            </tr>

            <tr>
                <td>5</td>
                <td>6</td>
            </tr>
        </tbody>
    </table>


    <!-- 4 таблица -->
    <table>
        <caption>4-я таблица</caption>

        <tbody>
            <tr>
                <th colspan="2">1</th>
            </tr>

            <tr>
                <th>3</th>
                <td rowspan="2">4</td>
            </tr>

            <tr>
                <td>5</td>
            </tr>
        </tbody>
    </table>
