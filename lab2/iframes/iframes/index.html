<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Организация фреймовой структуры</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            overflow: hidden;
        }

        iframe {
            border: none;
            height: 100vh;
        }

        .menu-frame {
            width: 200px;
            border-right: 1px solid black;
        }

        .content-frame {
            flex: 1;
        }
    </style>
</head>

<body>

    <!-- Левое меню -->
    <iframe
        src="../menu.html"
        name="menu"
        class="menu-frame">
    </iframe>

    <!-- Основной контент -->
    <iframe
        src="about:blank"
        name="content"
        class="content-frame">
    </iframe>

</body>

</html>
