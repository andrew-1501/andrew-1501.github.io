<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карта изображений</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
        }

        main {
            background: white;
            max-width: 1000px;
            margin: auto;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
        }

        img {
            max-width: 100%;
            border-radius: 10px;
            display: block;
            margin: auto;
        }

    </style>

</head>

<body>

<main>

    <h1>Навигация по лабораторным работам</h1>

    <p>
        Нажмите на область изображения
    </p>

    <img
        src="images/images/navigation.jpg"
        alt="Навигация"
        usemap="#labsmap"
        width="1000">

    <map name="labsmap">

        <area
            shape="rect"
            coords="0,0,250,250"
            href="lab1_1.html"
            alt="Lab 1">

        <area
            shape="rect"
            coords="250,0,500,250"
            href="lab1_2.html"
            alt="Lab 2">

        <area
            shape="rect"
            coords="500,0,750,250"
            href="lab1_4.html"
            alt="Lab 4">

        <area
            shape="rect"
            coords="750,0,1000,250"
            href="https://github.com"
            alt="GitHub">

    </map>

</main>

</body>

</html>
