<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Навигация по лабораторным</title>

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1e293b, #0f172a);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
            color: white;
        }

        main {
            width: 100%;
            max-width: 1100px;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
            font-size: 40px;
        }

        p {
            text-align: center;
            margin-bottom: 30px;
            font-size: 18px;
            color: #cbd5e1;
        }

        .image-container {
            position: relative;
            overflow: hidden;
            border-radius: 20px;
            transition: 0.3s;
        }

        .image-container:hover {
            transform: scale(1.01);
        }

        img {
            width: 100%;
            display: block;
            border-radius: 20px;
        }

        .footer {
            margin-top: 25px;
            text-align: center;
            color: #94a3b8;
            font-size: 14px;
        }

    </style>

</head>

<body>

<main>

    <h1>Навигация по лабораторным работам</h1>

    <p>
        Нажмите на нужный раздел изображения
    </p>

    <div class="image-container">

        <img
            src="images/images/navigation.jpg"
            alt="Навигация"
            usemap="#labsmap">

    </div>

    <map name="labsmap">

        <area
            shape="rect"
            coords="0,0,250,250"
            href="lab1_1.html"
            alt="Lab 1">

        <area
            shape="rect"
            coords="250,0,500,250"
            href="lab1_2.html"
            alt="Lab 2">

        <area
            shape="rect"
            coords="500,0,750,250"
            href="lab1_4.html"
            alt="Lab 4">

        <area
            shape="rect"
            coords="750,0,1000,250"
            href="https://github.com"
            alt="GitHub">

    </map>

    <div class="footer">
        HTML Image Map • GitHub Pages
    </div>

</main>

</body>

</html>
